# Kairix — Docker Compose stack
#
# Quick start (no clone needed):
#   1. Download this file: curl -O https://raw.githubusercontent.com/three-cubes/kairix/main/docker-compose.yml
#   2. Download .env example: curl -O https://raw.githubusercontent.com/three-cubes/kairix/main/.env.example
#   3. cp .env.example .env && edit .env (add your LLM API key)
#   4. ln -s /path/to/your/documents ./documents
#   5. docker compose up -d
#   6. docker compose exec kairix kairix setup
#   7. docker compose exec kairix kairix search "your question"
#
# Services:
#   kairix        — MCP server (port 8080) for agent integration + CLI
#   kairix-worker — background tasks (hourly embed, nightly entity seed)
#   neo4j         — knowledge graph for people/company/relationship queries

services:
  kairix:
    image: ghcr.io/three-cubes/kairix:latest
    # To build from source instead: comment out 'image' above and uncomment:
    # build: .
    ports:
      - "127.0.0.1:8080:8080"  # Bound to localhost only — kairix has no auth. Drop the 127.0.0.1 prefix and put a gateway in front to expose externally.
    volumes:
      - ./documents:/data/documents  # Your documents folder → container's document store
      - kairix-data:/data/kairix
      # Optional: mount a custom config file (created by kairix setup)
      # - ./kairix.config.yaml:/opt/kairix/kairix.config.yaml:ro
    env_file:
      - .env
    environment:
      - KAIRIX_NEO4J_URI=bolt://neo4j:7687
      - KAIRIX_NEO4J_USER=neo4j
      - KAIRIX_NEO4J_PASSWORD=${KAIRIX_NEO4J_PASSWORD}
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kairix", "onboard", "check"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 30s
    # Resource limits — sized for the v2026.5.10.5 async-tool refactor
    # which lets concurrent /mcp calls run on separate threads (#177).
    # Steady-state RSS observed at ~1.2 GB; 3 GB allows headroom for
    # bursts and rerank-model loading. CPU cap prevents kairix from
    # monopolising the host when neo4j or other tenants need compute.
    mem_limit: 3g
    mem_reservation: 1500m
    cpus: 4.0

  kairix-worker:
    image: ghcr.io/three-cubes/kairix:latest
    # To build from source instead: comment out 'image' above and uncomment:
    # build: .
    command: ["worker"]
    volumes:
      - ./documents:/data/documents  # Your documents folder → container's document store
      - kairix-data:/data/kairix
      # Optional: mount a custom config file
      # - ./kairix.config.yaml:/opt/kairix/kairix.config.yaml:ro
    env_file:
      - .env
    environment:
      - KAIRIX_NEO4J_URI=bolt://neo4j:7687
      - KAIRIX_NEO4J_USER=neo4j
      - KAIRIX_NEO4J_PASSWORD=${KAIRIX_NEO4J_PASSWORD}
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    # Worker steady-state RSS observed at ~150 MB. 1 GB cap is plenty;
    # cpus: 2.0 lets the embed pipeline burst without saturating the host.
    mem_limit: 1g
    mem_reservation: 256m
    cpus: 2.0

  neo4j:
    image: neo4j:5-community
    # Pin for production: neo4j:5.24.0-community
    environment:
      NEO4J_AUTH: neo4j/${KAIRIX_NEO4J_PASSWORD}
      NEO4J_PLUGINS: '[]'
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${KAIRIX_NEO4J_PASSWORD} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    # Uncomment to expose Neo4j browser (http://localhost:7474):
    # ports:
    #   - "7474:7474"
    #   - "7687:7687"
    # Neo4j heap is configured via NEO4J_server_memory_heap_max_size (set
    # via env var if you tune it). Container hard cap below provides a
    # backstop so a runaway neo4j can't OOM the host.
    mem_limit: 2g
    mem_reservation: 512m
    cpus: 2.0

volumes:
  kairix-data:
  neo4j-data:
