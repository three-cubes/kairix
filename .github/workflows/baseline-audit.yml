name: "5 · Baseline audit (scheduled)"

# Weekly audit of .architecture/baseline/*.txt entries.
# Catches files that no longer fail their F-rule (e.g. coverage now ≥ F7
# floor, file deleted, suppression removed) but still sit in the baseline
# pretending to be load-bearing.
#
# Manual trigger via workflow_dispatch supported so a maintainer can
# refresh after a big sweep. Failure is informational — review the run
# log, remove the stale entries, push.

on:
  schedule:
    # Mondays 08:00 UTC — catches drift accumulated over the previous
    # week's PRs before the team's planning cadence.
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  audit:
    name: Audit baseline entries for staleness
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]"

      - name: Generate coverage.xml
        run: |
          python3 -m pytest tests/ -m "unit or bdd or contract" \
            --cov=kairix --cov-report=xml --timeout=60 -q

      - name: Run baseline audit
        run: |
          python3 scripts/checks/audit_baselines.py coverage.xml
