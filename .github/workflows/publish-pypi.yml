# Publish kairix to PyPI when a GitHub Release is created.
#
# Trigger: GitHub Release creation (not tag push — gives you control over release notes)
# Requires: PyPI trusted publisher configured for this repo + "release" environment.
# Setup: https://docs.pypi.org/trusted-publishers/creating-a-project-through-oidc/
#
# Version is derived from the git tag via setuptools-scm — no manual version editing.

name: "4 · PyPI publish (release)"

on:
  release:
    types: [created]

jobs:
  sonar-gate:
    name: SonarCloud Quality Gate (release)
    # Hard gate at release time. The CI gate enforces the QG on every PR
    # to main, but a manually-created release event still needs an
    # independent check — neither Docker publish nor PyPI publish will
    # run unless SonarCloud reports OK on the released SHA.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: SonarCloud quality gate verdict for release
        env:
          PROJECT_KEY: quanyeomans_kairix
          BRANCH_REF: main
        run: |
          set -euo pipefail
          URL="https://sonarcloud.io/api/qualitygates/project_status?projectKey=${PROJECT_KEY}&branch=${BRANCH_REF}"
          for i in 1 2 3 4 5 6; do
              RESPONSE=$(curl -fsS --max-time 10 "$URL" || echo '{}')
              STATUS=$(echo "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('projectStatus',{}).get('status','MISSING'))" 2>/dev/null || echo "MISSING")
              if [ "$STATUS" = "OK" ]; then
                  echo "SonarCloud Quality Gate OK for ${BRANCH_REF}"
                  exit 0
              fi
              if [ "$STATUS" = "ERROR" ]; then
                  echo "SonarCloud Quality Gate ERROR — release blocked."
                  echo "$RESPONSE" | python3 -m json.tool 2>/dev/null || echo "$RESPONSE"
                  echo
                  echo "Triage at https://sonarcloud.io/project/issues?id=${PROJECT_KEY}"
                  exit 1
              fi
              echo "SonarCloud verdict not ready (status=${STATUS}); attempt ${i}/6, sleeping 15 s..."
              sleep 15
          done
          echo "FAILED: SonarCloud Quality Gate verdict still unavailable after 90 s — release blocked."
          exit 1

  build:
    name: Build package
    needs: sonar-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0  # setuptools-scm needs full history

      - uses: hynek/build-and-inspect-python-package@e6f4945c542cb46284a23bdb29121f4593636894 # v2

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: Packages
          path: dist/

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

  verify:
    name: Verify install
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Wait for PyPI propagation
        run: sleep 60

      - name: Install and smoke test
        # The PyPI distribution name (kairix-agentic-knowledge-mgt) is
        # different from the Python import name (kairix). pip resolves
        # the long form; ``import kairix`` and the ``kairix`` console
        # script are unchanged for end users.
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          pip install "kairix-agentic-knowledge-mgt==${VERSION}"
          python -c "import kairix; print(f'kairix {kairix.__version__} installed successfully')"
          kairix --version
