# Publish kairix to PyPI when a GitHub Release is created.
#
# Trigger: GitHub Release creation (not tag push — gives you control over release notes)
# Requires: PyPI trusted publisher configured for this repo + "release" environment.
# Setup: https://docs.pypi.org/trusted-publishers/creating-a-project-through-oidc/
#
# Version is derived from the git tag via setuptools-scm — no manual version editing.

name: "4 · PyPI publish (release)"

on:
  release:
    types: [created]
  workflow_dispatch:
    # Manual entrypoint used by release.yml to re-fire publish after a
    # GITHUB_TOKEN-created release (which doesn't fan out — #230).
    # Also used by release-alpha.yml to publish pre-release tags.
    inputs:
      ref:
        description: 'Git tag to build + publish (e.g. v2026.5.14 or v2026.5.15a1)'
        required: true
        type: string
      is_alpha:
        description: 'Set to true for pre-release tags — routes through the release-alpha environment (no protection timer).'
        required: false
        default: 'false'
        type: string

jobs:
  build:
    name: Build package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
          fetch-depth: 0  # setuptools-scm needs full history

      - uses: hynek/build-and-inspect-python-package@fe0a0fb1925ca263d076ca4f2c13e93a6e92a33e # v2

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Alpha tags publish through ``release-alpha`` (0-min protection timer);
    # stable tags publish through ``release`` (60-min protection timer).
    # Detection: ``release.prerelease`` fires for pre-release tags from the
    # GitHub UI; ``inputs.is_alpha`` is set by release-alpha.yml's dispatch.
    environment: ${{ (github.event.release.prerelease || inputs.is_alpha == 'true') && 'release-alpha' || 'release' }}
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: Packages
          path: dist/

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  verify:
    name: Verify install
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read  # smoke-test only installs and imports — no repo writes needed
    steps:
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Wait for PyPI propagation
        run: sleep 60

      - name: Install and smoke test
        # The PyPI distribution name (kairix-agentic-knowledge-mgt) is
        # different from the Python import name (kairix). pip resolves
        # the long form; ``import kairix`` and the ``kairix`` console
        # script are unchanged for end users.
        env:
          # release event provides .release.tag_name; workflow_dispatch
          # passes the tag via inputs.ref.
          TAG_NAME: ${{ github.event.release.tag_name || inputs.ref }}
        run: |
          VERSION="${TAG_NAME#v}"
          pip install "kairix-agentic-knowledge-mgt==${VERSION}"
          python -c "import kairix; print(f'kairix {kairix.__version__} installed successfully')"
          kairix --version
