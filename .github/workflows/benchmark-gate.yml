name: "1a · Benchmark gate (retrieval loop)"

# Automatic regression gate — runs on every PR that touches retrieval logic.
# Uses the mock retrieval backend (no Azure API required).
# Compares against the committed baseline in benchmark-results/contract-baseline.json.
#
# FAIL conditions:
#   - overall weighted_total drops by > 0.02 from baseline
#   - any category score drops below 0.50
#
# To update the baseline after an intentional change:
#   python3 -c "
#     from kairix.quality.benchmark.suite import load_suite
#     from kairix.quality.benchmark.runner import run_benchmark
#     import json
#     suite = load_suite('suites/contract-suite.yaml')
#     result = run_benchmark(suite, system='mock', agent='shared')
#     data = {'meta': result.meta, 'summary': result.summary, 'diagnostics': result.diagnostics, 'cases': result.cases}
#     json.dump(data, open('benchmark-results/contract-baseline.json', 'w'), indent=2)
#   "
#   Then commit benchmark-results/contract-baseline.json with the PR.

on:
  pull_request:
    paths:
      - "kairix/core/search/**"
      - "kairix/quality/benchmark/**"
      - "kairix/core/temporal/**"
      - "kairix/core/embed/**"
      - "kairix/knowledge/graph/**"
      - "suites/contract-suite.yaml"
      - "benchmark-results/contract-baseline.json"

jobs:
  benchmark-gate:
    name: Benchmark gate (contract suite)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run contract suite (mock backend)
        run: |
          python3 -c "
          from kairix.quality.benchmark.suite import load_suite
          from kairix.quality.benchmark.runner import run_benchmark
          import json

          suite = load_suite('suites/contract-suite.yaml')
          result = run_benchmark(suite, system='mock', agent='shared', output_dir=None)
          data = {
              'meta': result.meta,
              'summary': result.summary,
              'diagnostics': result.diagnostics,
              'cases': result.cases,
          }
          with open('/tmp/contract-current.json', 'w') as f:
              json.dump(data, f, indent=2)
          print(f'weighted_total: {result.summary[\"weighted_total\"]}')
          for cat, score in sorted(result.summary['category_scores'].items()):
              print(f'  {cat:<14} {score:.4f}')
          "

      - name: Compare against baseline
        id: compare
        run: |
          python3 -m kairix.quality.benchmark.baseline \
            benchmark-results/contract-baseline.json \
            /tmp/contract-current.json

      - name: Build PR comment body
        if: always() && github.event_name == 'pull_request'
        id: comment_body
        run: |
          python3 -c "
          import json, sys

          try:
              current = json.load(open('/tmp/contract-current.json'))
              baseline = json.load(open('benchmark-results/contract-baseline.json'))
          except Exception as e:
              print(f'Could not read result files: {e}', file=sys.stderr)
              sys.exit(0)

          cur_total = current['summary']['weighted_total']
          base_total = baseline['summary']['weighted_total']
          delta = cur_total - base_total
          passed = '${{ steps.compare.outcome }}' == 'success'
          emoji = '✅' if passed else '❌'

          lines = [
              f'## {emoji} Benchmark Gate — Contract Suite',
              '',
              f'**Weighted total:** {base_total:.4f} → {cur_total:.4f} ({delta:+.4f})',
              '',
              '| Category | Baseline | Current | Delta |',
              '|---|---|---|---|',
          ]
          cur_cats = current['summary'].get('category_scores', {})
          base_cats = baseline['summary'].get('category_scores', {})
          for cat in sorted(set(cur_cats) | set(base_cats)):
              b = base_cats.get(cat, 0.0)
              c = cur_cats.get(cat, 0.0)
              d = c - b
              flag = ' ⚠️' if c < 0.50 else (' ↓' if d < -0.01 else '')
              lines.append(f'| {cat} | {b:.4f} | {c:.4f} | {d:+.4f}{flag} |')

          lines += [
              '',
              '_No regression detected. Gate passed._' if passed
              else '_Gate failed: regression detected (threshold ±0.02). Review scores above._',
          ]

          body = chr(10).join(lines)
          # Write to env file for next step
          with open('/tmp/comment-body.txt', 'w') as f:
              f.write(body)
          print('Comment body written.')
          "

      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let body;
            try {
              body = fs.readFileSync('/tmp/comment-body.txt', 'utf8');
            } catch (e) {
              body = '⚠️ Benchmark gate: could not read results.';
            }

            // Find and update existing bot comment, or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes('Benchmark Gate — Contract Suite')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
