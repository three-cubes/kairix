name: "1 · CI Pipeline"

# Engineering hub compliance: 4-stage pipeline (contracts -> unit+type -> integration -> security)
# Ref: engineering-hub/standards/DEVELOPMENT-WORKFLOW.md, TESTING-STRATEGY.md

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Deny all permissions by default. Each job declares its own minimum.
permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Path-based change detection ────────────────────────────────────────────
  changes:
    name: "Detect changes"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      python: ${{ steps.filter.outputs.python }}
      docker: ${{ steps.filter.outputs.docker }}
      docs: ${{ steps.filter.outputs.docs }}
      reflib: ${{ steps.filter.outputs.reflib }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            python:
              - 'kairix/**/*.py'
              - 'tests/**/*.py'
              - 'pyproject.toml'
            docker:
              - 'Dockerfile'
              - 'docker-compose*.yml'
              - 'docker/**'
            docs:
              - 'docs/**'
              - '*.md'
              - '!CLAUDE.md'
            reflib:
              - 'kairix/knowledge/reflib/**'
              - 'reference-library/**'

  # ── Pre-commit (linting, formatting, secrets, file hygiene) ────────────────
  pre-commit:
    name: "Pre-commit checks"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.python == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

  # ── Stage 1: Contracts (fast -- <30s) ──────────────────────────────────────
  # Engineering hub: "Stop pipeline on failure. Contract tests must execute in <30s."
  # ── Stage 0: Architecture fitness functions ───────────────────────────────
  # Block at PR time on any net-new violation of the architectural rules
  # encoded in scripts/checks/. Pre-existing files are grandfathered in
  # .architecture/baseline/ and the baseline is expected to shrink over
  # time. See docs/architecture/fitness-functions.md.
  arch-fitness:
    name: "Stage 0 -- Architecture fitness"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.python == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Run F1-F6 (no test runtime needed)
        run: bash scripts/checks/run-all.sh --skip-coverage

  contracts:
    name: "Stage 1 -- Contracts"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.python == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Contract tests (schema validation, interface agreements)
        run: |
          pytest tests/ -m contract -v --tb=short --timeout=30 \
            --junitxml=results-contracts.xml

      - name: "paths-DI deprecation: count remaining monkeypatch.setenv(KAIRIX_*)"
        # Tracks progress of the paths-DI refactor (see docs/architecture/paths-di-refactor.md
        # and umbrella issue #139). Phase 0 ships warn-only. Phase 4 flips to fail.
        # Operates only on checked-out repo files; no untrusted GitHub-event input.
        run: |
          set +e
          MATCHES=$(grep -rln 'monkeypatch.setenv("KAIRIX_' tests/ --include='*.py' 2>/dev/null | sort -u)
          COUNT=$(printf '%s\n' "$MATCHES" | grep -c .)
          echo "::notice::paths-DI: ${COUNT} test files still call monkeypatch.setenv(KAIRIX_*) -- see docs/architecture/paths-di-refactor.md"
          if [ "$COUNT" -gt 0 ]; then
            echo "Files using monkeypatch.setenv(KAIRIX_*):"
            printf '  %s\n' $MATCHES
          fi
          # WARN-ONLY in Phase 0 -- exit 0 regardless. Phase 4 will switch to:
          #   if [ "$COUNT" -gt 0 ]; then exit 1; fi
          exit 0

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: test-results-contracts
          path: results-contracts.xml
          retention-days: 14

  # ── Stage 2: Unit tests + type checking (2 min) ───────────────────────────
  # Engineering hub: "Type checking: zero errors. Coverage: >=80%."
  unit-and-type:
    name: "Stage 2 -- Unit + Type (${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    needs: contracts
    if: needs.changes.outputs.python == 'true'
    permissions:
      contents: read
      checks: write       # required to post test results as PR checks
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies (with type stubs)
        run: |
          pip install -e ".[dev]"

      - name: Type checking -- mypy strict
        # Engineering hub: "mypy -- zero errors". Strict mode from Phase 1.
        run: |
          mypy kairix/ \
            --ignore-missing-imports \
            --disallow-untyped-defs \
            --disallow-incomplete-defs \
            --check-untyped-defs \
            --no-implicit-optional \
            --warn-redundant-casts \
            --warn-unused-ignores \
            --warn-return-any \
            --strict-equality

      - name: Linting -- ruff (GitHub annotations)
        # Engineering hub: "Linting / code quality: blocks merge."
        run: |
          ruff check kairix/ tests/ --output-format github
          ruff format --check kairix/ tests/

      - name: Unit + BDD + Contract tests with coverage
        run: |
          pytest tests/ \
            -m "unit or bdd or contract" \
            --cov=kairix \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            --junitxml=results-unit.xml \
            -v --tb=short

      - name: F7 — per-file coverage floor (85%)
        # Repo-wide coverage averages can hide files at 0%. F7 requires every
        # file in coverage.xml to clear the 85% floor; pre-existing files
        # below the floor are grandfathered in
        # .architecture/baseline/per-file-coverage-floor-files.txt and the
        # baseline is expected to shrink over time. Runs only on 3.12 to
        # match the Codecov upload step (XML uses Python-version-specific
        # paths in some configs).
        if: matrix.python-version == '3.12'
        run: python3 scripts/checks/check_per_file_coverage.py coverage.xml

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: test-results-unit-${{ matrix.python-version }}
          path: results-unit.xml
          retention-days: 14

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifacts (3.12 only)
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-data
          path: |
            .coverage
            coverage.xml
          retention-days: 7

  # ── Coverage delta PR comment ─────────────────────────────────────────────
  coverage:
    name: "Coverage report"
    runs-on: ubuntu-latest
    needs: [changes, unit-and-type]
    if: github.event_name == 'pull_request' && needs.changes.outputs.python == 'true'
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: coverage-data

      - uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 60
        continue-on-error: true

  # ── Stage 3: Integration tests ─────────────────────────────────────────────
  # Engineering hub: "Stop on >3 failures. Only mock external systems."
  integration:
    name: "Stage 3 -- Integration"
    runs-on: ubuntu-latest
    needs: unit-and-type
    if: needs.changes.outputs.python == 'true'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        # The agents extras (mcp>=1.20) are required for
        # tests/integration/test_mcp_build_server.py — those probes exercise
        # the production build_server() wiring and need the real FastMCP
        # package, not a stub.
        run: pip install -e ".[dev,agents]"

      - name: Integration tests
        # Coverage collected and uploaded so production-wiring code
        # exercised only at integration scope (factory.build_search_pipeline,
        # mcp.server.build_server, db.repository SQL surface) is measured.
        run: |
          pytest tests/ -m integration -v --tb=short --maxfail=3 \
            --cov=kairix \
            --cov-report=xml:coverage-integration.xml \
            --junitxml=results-integration.xml

      - name: Upload integration coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage-integration.xml
          flags: integration
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Verify core imports
        run: |
          python -c "from kairix.core.embed.embed import build_hash_seq; print('Embed OK')"
          python -c "from kairix.knowledge.store.crawler import crawl; print('Store OK')"
          python -c "from kairix.knowledge.reflib.sources import SOURCES; print(f'Reflib OK: {len(SOURCES)} sources')"

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: test-results-integration
          path: results-integration.xml
          retention-days: 14

  # ── Stage 4: Security ──────────────────────────────────────────────────────
  # Engineering hub: "4-layer defence: SAST, dependency analysis, dynamic, source control."
  security:
    name: "Stage 4 -- Security"
    runs-on: ubuntu-latest
    needs: unit-and-type
    if: needs.changes.outputs.python == 'true'
    # Run in parallel with integration -- both depend on unit passing
    permissions:
      contents: read
      security-events: write   # required to upload SARIF / security findings

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0  # Full history for secret scanning

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install security tools
        run: |
          pip install bandit pip-audit detect-secrets

      # Layer 1: SAST -- bandit
      # Engineering hub: "Bandit -- zero HIGH/MEDIUM findings."
      - name: SAST -- bandit
        run: |
          bandit -r kairix/ \
            --severity-level medium \
            --confidence-level medium \
            --format txt \
            --exit-zero \
            -o bandit-report.txt
          cat bandit-report.txt
          # Fail on HIGH severity (gate). MEDIUM documented in report only.
          bandit -r kairix/ \
            --severity-level high \
            --confidence-level high \
            --format txt

      # Layer 2: Dependency vulnerability scanning
      # Engineering hub: "No known CVEs with patches available. Update within 1 week."
      - name: Dependency scan -- pip-audit
        run: |
          pip install -e ".[dev]"
          pip-audit \
            --requirement <(pip freeze) \
            --format markdown \
            --output pip-audit-report.md \
            --strict
        continue-on-error: true  # Report but don't block — transitive dependency CVEs may not have fixes

      # Layer 4: Secret scanning against baseline
      # Engineering hub: "No secrets in commit history."
      - name: Secret scan -- detect-secrets
        run: |
          detect-secrets scan --baseline .secrets.baseline
          detect-secrets audit --report .secrets.baseline || true

      - name: Upload security reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: security-reports-${{ github.run_id }}
          path: |
            bandit-report.txt
            pip-audit-report.md
          retention-days: 30

  # ── Code quality: SonarCloud ───────────────────────────────────────────────
  # Catches duplication, code smells, complexity, maintainability debt.
  sonarcloud:
    name: "SonarCloud analysis"
    runs-on: ubuntu-latest
    needs: unit-and-type
    if: needs.changes.outputs.python == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: test-results-unit-3.12
        continue-on-error: true

      - name: Download coverage
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: coverage-data
        continue-on-error: true

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

  # ── Docker build verification ──────────────────────────────────────────────
  docker:
    name: "Docker build"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build image
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          load: true
          tags: kairix:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          docker run --rm --entrypoint python kairix:ci -c "import kairix; print('OK')"

      - name: Verify reference library in container
        run: |
          COUNT=$(docker run --rm --entrypoint sh kairix:ci -c "find /opt/kairix/reference-library -name '*.md' | wc -l")
          echo "Reference library docs: $COUNT"
          if [ "$COUNT" -lt 5000 ]; then
            echo "::error::Reference library has only $COUNT docs (expected 5800+)"
            exit 1
          fi
          docker run --rm --entrypoint sh kairix:ci -c "ls /opt/kairix/suites/*.yaml"

      - name: Image size gate (max 3GB)
        run: |
          SIZE_BYTES=$(docker image inspect kairix:ci --format '{{.Size}}')
          SIZE_MB=$((SIZE_BYTES / 1024 / 1024))
          echo "Image size: ${SIZE_MB}MB"
          if [ "$SIZE_MB" -gt 3072 ]; then
            echo "::error::Docker image is ${SIZE_MB}MB — exceeds 3GB gate. Check for CUDA libs or unnecessary dependencies."
            exit 1
          fi

  # ── Fan-in gate (branch protection target) ─────────────────────────────────
  check:
    name: "CI gate"
    if: always()
    runs-on: ubuntu-latest
    needs:
      - changes
      - arch-fitness
      - pre-commit
      - contracts
      - unit-and-type
      - coverage
      - integration
      - security
      - docker
    permissions: {}
    steps:
      - name: Evaluate job results
        env:
          RESULT_ARCH: ${{ needs.arch-fitness.result }}
          RESULT_PRECOMMIT: ${{ needs.pre-commit.result }}
          RESULT_CONTRACTS: ${{ needs.contracts.result }}
          RESULT_UNIT: ${{ needs.unit-and-type.result }}
          RESULT_COVERAGE: ${{ needs.coverage.result }}
          RESULT_INTEGRATION: ${{ needs.integration.result }}
          RESULT_SECURITY: ${{ needs.security.result }}
          RESULT_DOCKER: ${{ needs.docker.result }}
        run: |
          echo "arch-fitness:  $RESULT_ARCH"
          echo "pre-commit:    $RESULT_PRECOMMIT"
          echo "contracts:     $RESULT_CONTRACTS"
          echo "unit-and-type: $RESULT_UNIT"
          echo "coverage:      $RESULT_COVERAGE"
          echo "integration:   $RESULT_INTEGRATION"
          echo "security:      $RESULT_SECURITY"
          echo "docker:        $RESULT_DOCKER"

          # Fail if any required job failed (skipped is OK -- path filter)
          for result in \
            "$RESULT_ARCH" \
            "$RESULT_PRECOMMIT" \
            "$RESULT_CONTRACTS" \
            "$RESULT_UNIT" \
            "$RESULT_INTEGRATION" \
            "$RESULT_SECURITY" \
            "$RESULT_DOCKER"; do
            # Note: RESULT_COVERAGE excluded from gate — coverage enforcement
            # is done by --cov-fail-under=80 in the unit test job and per-file
            # 85% floor (F7) inside arch-fitness. The coverage report action
            # only posts a PR comment (non-critical).
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "FAILED: at least one required job did not succeed ($result)"
              exit 1
            fi
          done
          echo "All required jobs passed or were skipped."
