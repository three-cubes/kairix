version: 2

# Supply-chain hardening: every version update sits in a 7-day cooldown
# (semver-major: 14 days). Cooldown only applies to version updates —
# security advisories still surface immediately so CVE patches aren't
# delayed. Rationale: worm-injection attacks on package managers
# (npm, PyPI) typically get caught and yanked within days of release.

updates:
  # Python dependencies (pip)
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: "Australia/Sydney"
    open-pull-requests-limit: 5
    reviewers:
      - quanyeomans
    labels:
      - dependency
      - automated
    commit-message:
      prefix: "chore(deps)"
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 7
    # Group minor/patch updates to reduce PR noise
    groups:
      dev-dependencies:
        patterns:
          - "pytest*"
          - "mypy*"
          - "ruff"
          - "bandit"
          - "pip-audit"
          - "coverage*"
          - "types-*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: "Australia/Sydney"
    open-pull-requests-limit: 3
    reviewers:
      - quanyeomans
    labels:
      - dependency
      - automated
      - github-actions
    commit-message:
      prefix: "chore(actions)"
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 7
