sonar.projectKey=quanyeomans_kairix
sonar.organization=quanyeomans

sonar.sources=kairix/
sonar.tests=tests/
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.version=3.12

# Exclude reference library (third-party content) and test fixtures
sonar.exclusions=reference-library/**,tests/integration/reflib_fixture/**

# Quality gate thresholds
sonar.cpd.minimumTokens=50

# ----------------------------------------------------------------------------
# Issue exclusions — version-controlled mirror of the rules silenced where
# they're false-positive prone for kairix's shape. Same exclusions configured
# in the SonarCloud UI; this file makes them PR-reviewable and survives a
# project rebuild. UI entries can be removed once this lands.
#
# Each entry has a rationale; review during quality-gate audits.
# ----------------------------------------------------------------------------

sonar.issue.ignore.multicriteria=tests-creds,tests-perms,benchmark-log,monitor-log,scripts-paths

# python:S2068 — Hard-coded credentials. Test fixtures use literal "test"
# passwords because the connection is to a fake or in-memory backend; no
# real production secret is involved. The rule stays active for production
# code (it would still fire on a literal password in kairix/secrets.py).
sonar.issue.ignore.multicriteria.tests-creds.ruleKey=python:S2068
sonar.issue.ignore.multicriteria.tests-creds.resourceKey=tests/**/*

# python:S2612 — File permissions. Kairix only sets 0o644 (read-by-all,
# write-by-owner) and 0o600 (secrets file). Both are standard; the rule
# fires regardless of mode value. Tests exercise chmod paths to verify
# the secrets module's permission handling — that's the point.
sonar.issue.ignore.multicriteria.tests-perms.ruleKey=python:S2612
sonar.issue.ignore.multicriteria.tests-perms.resourceKey=tests/**/*

# pythonsecurity:S5145 — Logging user-controlled data. The benchmark
# baseline logs its own comparison summary lines; the eval monitor logs
# OS-error exception classes. Neither carries agent/user input. The rule
# stays active for kairix/agents/** where MCP tool args ARE user-
# controlled and could legitimately flow into logs.
sonar.issue.ignore.multicriteria.benchmark-log.ruleKey=pythonsecurity:S5145
sonar.issue.ignore.multicriteria.benchmark-log.resourceKey=kairix/quality/**/*

sonar.issue.ignore.multicriteria.monitor-log.ruleKey=pythonsecurity:S5145
sonar.issue.ignore.multicriteria.monitor-log.resourceKey=kairix/quality/eval/monitor.py

# pythonsecurity:S2083 — Path traversal. The kairix CLI runs with the
# calling user's filesystem permissions and operates inside the local-
# process trust model; --output PATH is the trust boundary itself. Same
# argument applies to operator scripts under scripts/. The rule stays
# active for kairix/agents/** (server-mode code paths).
sonar.issue.ignore.multicriteria.scripts-paths.ruleKey=pythonsecurity:S2083
sonar.issue.ignore.multicriteria.scripts-paths.resourceKey=scripts/**/*
