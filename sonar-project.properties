sonar.projectKey=three-cubes_kairix
sonar.organization=three-cubes

sonar.sources=kairix/
sonar.tests=tests/
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.version=3.12

# Exclude reference library (third-party content) and test fixtures
sonar.exclusions=reference-library/**,tests/integration/reflib_fixture/**

# Quality gate thresholds
sonar.cpd.minimumTokens=50

# ----------------------------------------------------------------------------
# Issue exclusions — version-controlled mirror of the rules silenced where
# they're false-positive prone for kairix's shape. Same exclusions configured
# in the SonarCloud UI; this file makes them PR-reviewable and survives a
# project rebuild. UI entries can be removed once this lands.
#
# Each entry has a rationale; review during quality-gate audits.
# ----------------------------------------------------------------------------

sonar.issue.ignore.multicriteria=tests-creds,tests-perms,benchmark-log,monitor-log,scripts-paths,tests-reraise,tests-tmp-writable,tests-camelcase,tests-type-misuse,worker-reraise,tests-commented-code,tests-string-dupes,scripts-string-dupes,fakes-protocol-args,fixtures-protocol-args,starlette-async-handlers,list-mutation-snapshots

# python:S2068 — Hard-coded credentials. Test fixtures use literal "test"
# passwords because the connection is to a fake or in-memory backend; no
# real production secret is involved. The rule stays active for production
# code (it would still fire on a literal password in kairix/secrets.py).
# Pattern uses ``tests/**`` (not ``tests/**/*``) so it also matches top-level
# fixtures like ``tests/test_credentials.py`` and ``tests/test_secrets.py``.
sonar.issue.ignore.multicriteria.tests-creds.ruleKey=python:S2068
sonar.issue.ignore.multicriteria.tests-creds.resourceKey=tests/**

# python:S2612 — File permissions. Kairix only sets 0o644 (read-by-all,
# write-by-owner) and 0o600 (secrets file). Both are standard; the rule
# fires regardless of mode value. Tests exercise chmod paths to verify
# the secrets module's permission handling — that's the point.
sonar.issue.ignore.multicriteria.tests-perms.ruleKey=python:S2612
sonar.issue.ignore.multicriteria.tests-perms.resourceKey=tests/**

# pythonsecurity:S5145 — Logging user-controlled data. The benchmark
# baseline logs its own comparison summary lines; the eval monitor logs
# OS-error exception classes. Neither carries agent/user input. The rule
# stays active for kairix/agents/** where MCP tool args ARE user-
# controlled and could legitimately flow into logs.
sonar.issue.ignore.multicriteria.benchmark-log.ruleKey=pythonsecurity:S5145
sonar.issue.ignore.multicriteria.benchmark-log.resourceKey=kairix/quality/**/*

# pythonsecurity:S5145 — Same rationale as benchmark-log above; the eval
# monitor's log call site has the identical no-agent/no-user-input shape
# (OS-error exception class only), narrowed to the single monitor.py file.
sonar.issue.ignore.multicriteria.monitor-log.ruleKey=pythonsecurity:S5145
sonar.issue.ignore.multicriteria.monitor-log.resourceKey=kairix/quality/eval/monitor.py

# pythonsecurity:S2083 — Path traversal. The kairix CLI runs with the
# calling user's filesystem permissions and operates inside the local-
# process trust model; --output PATH is the trust boundary itself. Same
# argument applies to operator scripts under scripts/. The rule stays
# active for kairix/agents/** (server-mode code paths).
sonar.issue.ignore.multicriteria.scripts-paths.ruleKey=pythonsecurity:S2083
sonar.issue.ignore.multicriteria.scripts-paths.resourceKey=scripts/**/*

# python:S5754 — "Reraise this exception to stop the application as the user expects."
# CLI test helpers in tests/**/test_cli*.py legitimately catch ``SystemExit`` to
# extract the exit code from ``cli.main()`` (which calls ``sys.exit()``). Re-raising
# would defeat the test pattern. The rule stays active for production code, where
# a swallowed exception would be a real bug.
sonar.issue.ignore.multicriteria.tests-reraise.ruleKey=python:S5754
sonar.issue.ignore.multicriteria.tests-reraise.resourceKey=tests/**

# python:S5443 — "Make sure publicly writable directories are used safely here."
# Test fixtures use pytest's ``tmp_path`` (per-test isolated directory under the
# user's pytest tmpdir root, typically /tmp/pytest-of-<user>/) and occasionally
# literal /tmp paths for staging — never a real shared-tenancy host. The fixture
# is isolated per test, cleaned by pytest, and never touches production data.
# Pattern uses ``tests/**`` (not ``tests/**/*``) so it also matches top-level
# files like ``tests/test_worker.py`` that exercise tmp-path fixtures directly.
sonar.issue.ignore.multicriteria.tests-tmp-writable.ruleKey=python:S5443
sonar.issue.ignore.multicriteria.tests-tmp-writable.resourceKey=tests/**

# python:S100 — Method name doesn't match snake_case regex.
# tests/plugins/test_kairix_memory_prompt.py mocks the openclaw plugin API which
# uses camelCase by external convention (``appendSystemContext``). Renaming the
# fake's method to snake_case would break the contract the real openclaw
# loader expects from a plugin.
sonar.issue.ignore.multicriteria.tests-camelcase.ruleKey=python:S100
sonar.issue.ignore.multicriteria.tests-camelcase.resourceKey=tests/plugins/**

# python:S5655 — "Function expects a different type." Tests in
# tests/temporal/test_rewriter.py, tests/temporal/test_index.py, and
# tests/embed/test_embed_coverage.py deliberately pass type-mismatched
# arguments (``None``, ints, sketchy ``__format__`` objects) to exercise
# the production code's outer ``try/except`` branches. These are
# defensive-path tests — the API contract is "never raises on bad input,
# returns the documented fallback" — and the only way to drive the branch
# is to actually hand the function bad input. Each call is marked with
# ``# type: ignore[arg-type]`` so mypy still flags accidental misuse in
# non-test code. The rule stays active for production code, where a
# type-mismatch is a real bug.
sonar.issue.ignore.multicriteria.tests-type-misuse.ruleKey=python:S5655
sonar.issue.ignore.multicriteria.tests-type-misuse.resourceKey=tests/**

# python:S5754 — Same "swallow SystemExit on purpose" pattern as the test
# helpers, but in production: ``kairix/worker.py`` deliberately catches
# ``(Exception, SystemExit)`` around embed and wikilinks-inject so a recall
# gate alert (or any other ``sys.exit(1)`` inside a use case) does NOT kill
# the worker process. The worker's job is to KEEP RUNNING on its schedule;
# the use case's job is to do the work and report what happened (#224 +
# pre-v2026.5.10 worker fix). Re-raising would re-introduce the regression.
sonar.issue.ignore.multicriteria.worker-reraise.ruleKey=python:S5754
sonar.issue.ignore.multicriteria.worker-reraise.resourceKey=kairix/worker.py

# python:S125 — "Remove this commented out code." All flagged sites in tests
# are explanatory comments (test-data semantics, expected weighted-total
# arithmetic, section dividers, fixture annotations), not dead code. The
# rule has a known high false-positive rate against test files that lean on
# inline comments to document data shape; suppressing tests-wide keeps the
# rule active on production code (where commented-out code is a real smell).
sonar.issue.ignore.multicriteria.tests-commented-code.ruleKey=python:S125
sonar.issue.ignore.multicriteria.tests-commented-code.resourceKey=tests/**/*

# python:S1192 — "Define a constant for this duplicated literal." Test
# fixtures legitimately repeat string literals across independent test
# cases (e.g. ``"CONTRIBUTING.md"`` as a sample filename, ``"test question"``
# as a sample query) — each occurrence is a distinct test fact, not a
# duplicated production constant. Extracting a module-level constant
# would couple unrelated tests through a shared name and obscure the
# per-test intent.
sonar.issue.ignore.multicriteria.tests-string-dupes.ruleKey=python:S1192
sonar.issue.ignore.multicriteria.tests-string-dupes.resourceKey=tests/**/*

# python:S1192 — ``scripts/sonar/triage_hotspots.py`` defines rationales
# keyed by ``(rule_id, file_path)`` tuples; the rule id appears as a dict
# key for every file it covers (e.g. ``"python:S5852"`` x10, ``"python:S2245"``
# x4). Extracting to a constant would obscure the keys at the use site —
# the rule id IS the key, not a duplicated literal.
sonar.issue.ignore.multicriteria.scripts-string-dupes.ruleKey=python:S1192
sonar.issue.ignore.multicriteria.scripts-string-dupes.resourceKey=scripts/sonar/**/*

# python:S1172 — "Remove the unused function parameter." ``tests/fakes.py``
# implements every kairix domain Protocol (Classifier, VectorSearch, Boost,
# Scorer, SearchLogger, …) for test injection. Many Protocol methods
# accept parameters that some fake implementations don't need (e.g. a
# ``NoopBoost.boost()`` ignores ``query`` and ``context``). The fakes
# MUST keep the exact Protocol signature so ``isinstance(fake, Protocol)``
# succeeds and so callers can swap fakes 1:1 with real implementations.
# Underscore-prefixing every Protocol param across fakes.py would couple
# the test fakes to internal naming conventions and obscure the
# Protocol-shaped intent.
sonar.issue.ignore.multicriteria.fakes-protocol-args.ruleKey=python:S1172
sonar.issue.ignore.multicriteria.fakes-protocol-args.resourceKey=tests/fakes.py

# python:S1172 — Same rationale as fakes-protocol-args, but for the Neo4j
# mock fixture (tests/fixtures/neo4j_mock.py). The mock implements the
# ``Neo4jClient`` API surface that kairix calls; unused params in helper
# methods are kept for signature parity with the real client so the mock
# is a drop-in replacement.
sonar.issue.ignore.multicriteria.fixtures-protocol-args.ruleKey=python:S1172
sonar.issue.ignore.multicriteria.fixtures-protocol-args.resourceKey=tests/fixtures/**/*

# python:S7503 — "Use asynchronous features in this function or remove the
# async keyword." Starlette HTTP route handlers MUST be ``async def`` even
# when the handler body is purely synchronous — the framework awaits them
# unconditionally. ``kairix/agents/mcp/transport.py`` and its test
# composition harness both define such handlers; removing ``async`` would
# break the route contract. Narrow scope to the two files that compose
# Starlette routes.
sonar.issue.ignore.multicriteria.starlette-async-handlers.ruleKey=python:S7503
sonar.issue.ignore.multicriteria.starlette-async-handlers.resourceKey=**/mcp/transport.py,**/mcp/test_transport_composition.py

# python:S7504 — "Remove this unnecessary list() call on an already
# iterable object." ``tests/test_init.py:_restore_kairix_modules`` and
# ``scripts/checks/merge_coverage_xml.py`` both iterate over a collection
# WHILE mutating it (popping items / removing elements). The ``list(...)``
# snapshot is load-bearing — removing it raises ``RuntimeError: dictionary
# changed size during iteration`` (or silently skips elements in lxml).
# Sonar's static check can't tell the iteration mutates its target.
sonar.issue.ignore.multicriteria.list-mutation-snapshots.ruleKey=python:S7504
sonar.issue.ignore.multicriteria.list-mutation-snapshots.resourceKey=tests/test_init.py,scripts/checks/merge_coverage_xml.py
