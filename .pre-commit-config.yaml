# Pre-commit hooks -- run locally and in CI via pre-commit/action@v3.0.1
# Install: pre-commit install
# Run all: pre-commit run --all-files

# Global exclude: reference library is external open-source content — not ours to lint
exclude: ^reference-library/

repos:
  # ── Ruff (lint + isort + format — replaces black, isort, flake8) ───────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ── General file hygiene ───────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]

  # ── Secret detection ───────────────────────────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]

  # ── Architecture fitness functions ─────────────────────────────────────────
  # Each check fails the commit on net-new violations. Pre-existing files
  # are grandfathered via .architecture/baseline/ and the baseline is
  # expected to shrink over time. See docs/architecture/fitness-functions.md.
  - repo: local
    hooks:
      - id: arch-no-internal-patches
        name: "arch F1: no @patch on kairix internals"
        entry: bash scripts/checks/check-no-internal-patches.sh
        language: system
        pass_filenames: false
        files: ^tests/.*\.py$

      - id: arch-no-env-monkeypatch
        name: "arch F2: no monkeypatch.setenv(KAIRIX_*)"
        entry: bash scripts/checks/check-no-env-monkeypatch.sh
        language: system
        pass_filenames: false
        files: ^tests/.*\.py$

      - id: arch-env-reads-in-paths
        name: "arch F4: os.environ KAIRIX_* reads stay in paths.py/secrets.py"
        entry: bash scripts/checks/check-env-reads-stay-in-paths.sh
        language: system
        pass_filenames: false
        files: ^kairix/.*\.py$

      - id: arch-suppressions-have-rationale
        name: "arch F3: suppressions require rationale"
        entry: bash scripts/checks/check-suppressions-have-rationale.sh
        language: system
        pass_filenames: false
        files: \.py$

      - id: arch-no-internal-test-imports
        name: "arch F5: no internal-name imports in tests"
        entry: python3 scripts/checks/check_no_internal_imports.py
        language: system
        pass_filenames: false
        files: ^tests/.*\.py$

      - id: arch-no-test-only-kwargs
        name: "arch F6: no *_fn=None test-only kwargs in production"
        entry: python3 scripts/checks/check_no_test_only_kwargs.py
        language: system
        pass_filenames: false
        files: ^kairix/.*\.py$
