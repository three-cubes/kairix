# Pre-commit hooks -- run locally and in CI via pre-commit/action@v3.0.1
# Install: pre-commit install
# Run all: pre-commit run --all-files

# Global exclude: reference library is external open-source content — not ours to lint
exclude: ^reference-library/

repos:
  # ── Ruff (lint + isort + format — replaces black, isort, flake8) ───────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ── General file hygiene ───────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]

  # ── Secret detection ───────────────────────────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]

  # ── Architecture fitness functions ─────────────────────────────────────────
  # Each check fails the commit on net-new violations. Pre-existing files
  # are grandfathered via .architecture/baseline/ and the baseline is
  # expected to shrink over time. See docs/architecture/fitness-functions.md.
  - repo: local
    hooks:
      - id: arch-no-internal-patches
        name: "arch F1: no @patch on kairix internals"
        entry: bash scripts/checks/check-no-internal-patches.sh
        language: system
        pass_filenames: false
        files: ^tests/.*\.py$

      - id: arch-no-env-monkeypatch
        name: "arch F2: no monkeypatch.setenv(KAIRIX_*)"
        entry: bash scripts/checks/check-no-env-monkeypatch.sh
        language: system
        pass_filenames: false
        files: ^tests/.*\.py$

      - id: arch-env-reads-in-paths
        name: "arch F4: os.environ KAIRIX_* reads stay in paths.py/secrets.py"
        entry: bash scripts/checks/check-env-reads-stay-in-paths.sh
        language: system
        pass_filenames: false
        files: ^kairix/.*\.py$

      - id: arch-suppressions-have-rationale
        name: "arch F3: suppressions require rationale"
        entry: bash scripts/checks/check-suppressions-have-rationale.sh
        language: system
        pass_filenames: false
        files: \.py$

      - id: arch-no-internal-test-imports
        name: "arch F5: no internal-name imports in tests"
        entry: python3 scripts/checks/check_no_internal_imports.py
        language: system
        pass_filenames: false
        files: ^tests/.*\.py$

      - id: arch-no-test-only-kwargs
        name: "arch F6: no *_fn=None test-only kwargs in production"
        entry: python3 scripts/checks/check_no_test_only_kwargs.py
        language: system
        pass_filenames: false
        files: ^kairix/.*\.py$

      - id: arch-test-markers
        name: "arch F8: every test_* function has a category marker"
        entry: python3 scripts/checks/check_test_markers.py
        language: system
        pass_filenames: false
        files: ^tests/.*\.py$

      - id: arch-workflow-silencers-have-rationale
        name: "arch F10: CI workflow silencers require rationale"
        entry: bash scripts/checks/check-workflow-silencers-have-rationale.sh
        language: system
        pass_filenames: false
        files: ^\.github/workflows/.*\.yml$

      - id: arch-test-skip-rationale
        name: "arch F11: test skip mechanisms require rationale"
        entry: python3 scripts/checks/check_test_skip_rationale.py
        language: system
        pass_filenames: false
        files: ^tests/.*\.py$

      - id: arch-bdd-happy-path
        name: "arch F12: every feature has a happy-path scenario"
        entry: python3 scripts/checks/check_bdd_happy_path.py
        language: system
        pass_filenames: false
        files: ^tests/bdd/features/.*\.feature$

      - id: arch-bdd-no-implementation-leaks
        name: "arch F13: BDD scenarios reject implementation symbols"
        entry: python3 scripts/checks/check_bdd_no_implementation_leaks.py
        language: system
        pass_filenames: false
        files: ^tests/bdd/features/.*\.feature$

      - id: arch-sonar-ignore-rationale
        name: "arch F14: sonar.issue.ignore entries require rationale"
        entry: python3 scripts/checks/check_sonar_ignore_rationale.py
        language: system
        pass_filenames: false
        files: ^sonar-project\.properties$

      - id: arch-no-logging-secrets
        name: "arch F15: no logging secret-named variables in plaintext"
        entry: python3 scripts/checks/check_no_logging_secrets.py
        language: system
        pass_filenames: false
        files: ^kairix/.*\.py$

      - id: arch-cognitive-complexity
        name: "arch F16: cognitive complexity <= 15 per function"
        entry: python3 scripts/checks/check_cognitive_complexity.py
        language: system
        pass_filenames: false
        files: ^kairix/.*\.py$

      - id: arch-no-duplicate-string
        name: "arch F17: no duplicated string literal (>=10 chars, >=3 occurrences)"
        entry: python3 scripts/checks/check_no_duplicate_string.py
        language: system
        pass_filenames: false
        files: ^kairix/.*\.py$

      - id: arch-no-commented-out-code
        name: "arch F18: no commented-out code"
        entry: python3 scripts/checks/check_no_commented_out_code.py
        language: system
        pass_filenames: false
        files: ^kairix/.*\.py$

      - id: arch-unused-params-named
        name: "arch F19: unused parameter requires _ prefix"
        entry: python3 scripts/checks/check_unused_params_named.py
        language: system
        pass_filenames: false
        files: ^kairix/.*\.py$

      - id: arch-empty-body-intent
        name: "arch F20: empty function body requires docstring or intent comment"
        entry: python3 scripts/checks/check_empty_body_intent.py
        language: system
        pass_filenames: false
        files: ^kairix/.*\.py$

      - id: arch-actionable-feedback
        name: "arch F21: check-script failure output must be agent-actionable"
        entry: python3 scripts/checks/check_actionable_feedback.py
        language: system
        pass_filenames: false
        files: ^scripts/checks/.*$

      - id: arch-path-naming
        name: "arch F22: repo path naming conventions per tree"
        entry: python3 scripts/checks/check_path_naming.py
        language: system
        pass_filenames: false
        always_run: true

      - id: arch-readme-coverage
        name: "arch F23: every top-level directory has a README.md"
        entry: python3 scripts/checks/check_readme_coverage.py
        language: system
        pass_filenames: false
        always_run: true
