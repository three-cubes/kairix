# kairix.example.config.yaml
# Copy to kairix.config.yaml and adjust for your corpus type.
#
# Corpus type presets:
#   consulting   — entity + procedural boost on; temporal off (default)
#   daily-log    — date-path temporal boost on; entity optional
#   technical    — entity off; procedural extended patterns on
#
# Set KAIRIX_CONFIG_PATH=/path/to/kairix.config.yaml to use a custom location.

# ── Provider ────────────────────────────────────────────────────────────────
# Which LLM/embed plugin to load. Each plugin owns its own credential-
# retrieval pattern (Azure → Key Vault; AWS → Secrets Manager; etc.)
# so you don't configure secrets here — the plugin reads them from
# wherever its operator runbook says.
#
# Installed plugins (run `kairix probe-config` to verify your choice
# resolves):
#   azure_foundry  — Azure AI Foundry endpoint (default for existing deploys)
#   openai         — OpenAI direct (api.openai.com or compatible base_url)
#
# Plugins shipping in v2026.5.18:
#   azure_legacy / bedrock / ollama / litellm_proxy / anthropic
#
# Operators upgrading from v2026.5.16 or earlier MUST set this field —
# the env-var fallback (KAIRIX_PROVIDER) was retired in v2026.5.17 so
# the plugin is the only embed/chat path. See
# docs/operations/runbooks/how-to-upgrade-kairix.md for the migration
# step.
provider: azure_foundry

# ── Paths ───────────────────────────────────────────────────────────────────
# Where your documents and data live. Defaults work for most setups.
# Environment variables (KAIRIX_DOCUMENT_ROOT, KAIRIX_DB_PATH, etc.) take
# precedence over these values.
#
# paths:
#   document_root: ~/Documents/my-notes  # your documents folder
#   db_path: ~/.cache/kairix/index.sqlite # search index
#   log_dir: ~/.cache/kairix/logs         # search and embed logs
#   workspace_root: ~/.kairix/workspaces  # agent memory logs

# ── Collections ─────────────────────────────────────────────────────────────
# Organise your documents into named collections for search scoping.
# Each collection maps a name to a folder inside your document store.
# If not configured, all documents in your vault are searched as one collection.
#
# Each collection accepts an optional ``in_default: bool`` flag (default
# ``true``) controlling whether the collection participates in the *default*
# search scopes (shared / shared+agent / all-agents / everything). A
# collection with ``in_default: false`` is still scanned, indexed, and
# reachable via an explicit ``--collection <name>`` lookup — it just doesn't
# auto-join the default mix.
#
# When to set ``in_default: false``:
#   - large reference corpora (the reference library below) — they would
#     otherwise dominate result mix on common terms
#   - archives that agents should consult deliberately, not as part of every
#     default search ("did this come up in the archive?" is a different
#     question from "did this come up in our current knowledge?")
#
# collections:
#   # Shared collections — searched by all agents
#   shared:
#     - name: projects
#       path: "01-Projects"
#       glob: "**/*.md"
#     - name: areas
#       path: "02-Areas"
#       glob: "**/*.md"
#     - name: knowledge
#       path: "05-Knowledge"
#       glob: "**/*.md"
#     # Opt-in collections — indexed but excluded from default scopes:
#     - name: archive
#       path: "06-Archive"
#       glob: "**/*.md"
#       in_default: false
#     - name: reference-library
#       path: "reference-library"
#       glob: "**/*.md"
#       in_default: false
#       # The reference library has its own retrieval baseline. The
#       # values below produce the pinned baseline at
#       # benchmark-results/reflib-gold-v3-baseline.json (weighted=0.901
#       # NDCG@10=0.990 Hit@5=0.990). The corpus is keyword-sparse and
#       # vector-rich (abstract titles + paraphrase queries), so it
#       # depends on cross-list agreement — RRF with k=10 weights
#       # agreement strongly. Operators who don't override get the
#       # global retrieval config when they search reflib explicitly.
#       retrieval:
#         fusion_strategy: rrf
#         rrf_k: 10
#         bm25_limit: 20
#         vec_limit: 10
#         boosts:
#           entity:
#             enabled: false
#           procedural:
#             enabled: false
#
#   # Per-agent collections — each agent gets its own memory scope.
#   # Default agent_pattern still applies for legacy single-collection deployments.
#   agent_pattern: "{agent}-memory"
#
# # ── Agents (multi-path schema) ────────────────────────────────────────────
# # Declare each agent that exists. Each agent has a list of read paths
# # (the agent's search scope) and a single write_path (the agent's write
# # zone). Out of the box kairix uses /data/workspaces/{name} when paths
# # are omitted, so a minimal config just names the agents.
# #
# # Three deployment shapes are supported:
# #
# #   1. Default (out of the box):
# #      agents:
# #        - name: alice
# #          write_path: /data/workspaces/alice
# #
# #   2. Single explicit path:
# #      agents:
# #        - name: bob
# #          paths:
# #            - /data/workspaces/bob
# #          write_path: /data/workspaces/bob
# #
# #   3. Multi-path (e.g. workspace + curated knowledge + cross-agent shared):
# #      agents:
# #        - name: shape
# #          paths:
# #            - /data/workspaces/shape          # absolute, primary workspace
# #            - 04-Agent-Knowledge/shape        # relative to document_root
# #            - 04-Agent-Knowledge/shared       # cross-agent shared area
# #          write_path: /data/workspaces/shape
# #
# # Legacy schema still parses: a top-level ``collection: <name>`` field is
# # honoured as the first synthetic collection name so saved benchmarks /
# # search calls keep resolving without re-pinning.
# agents:
#   - name: alpha
#     paths:
#       - /data/workspaces/alpha
#     write_path: /data/workspaces/alpha
#   - name: beta
#     paths:
#       - /data/workspaces/beta
#       - 04-Agent-Knowledge/beta
#       - 04-Agent-Knowledge/shared
#     write_path: /data/workspaces/beta
#     read_only: false

retrieval:
  # Fusion strategy: how keyword (BM25) and meaning-based (vector) search results are combined.
  #
  # "bm25_primary" (default) — keyword results ranked first, meaning-based results appended.
  #   Best for structured knowledge bases with keyword-rich filenames and headings
  #   (wikis, runbooks, Obsidian vaults, consulting/enterprise knowledge).
  #
  # "rrf" — standard Reciprocal Rank Fusion, equal weight to both approaches.
  #   Better for corpora where meaning-based similarity is the primary signal
  #   (research papers, long-form prose, multilingual content).
  #
  # To find the best strategy for YOUR data, run:
  #   kairix eval build-gold --suite queries.yaml --output gold.yaml
  #   kairix eval hybrid-sweep --suite gold.yaml
  fusion_strategy: "bm25_primary"

  # RRF constant (only used when fusion_strategy is "rrf").
  # Higher values flatten the ranking. Default: 60.
  # rrf_k: 60

  boosts:
    entity:
      enabled: true          # Boost documents for known named entities (Neo4j MENTIONS in-degree)
      factor: 0.20           # Log-scale weight. Raise for entity-dense corpora.
      cap: 2.0               # Max boost multiplier. Prevents runaway scores.

    procedural:
      enabled: true          # Boost procedural docs (how-to guides, runbooks, SOPs)
      factor: 1.4            # Score multiplier for matching paths.
      path_patterns:
        - "(?:^|/)how-to-"
        - "(?:^|/)runbooks?/"
        - "(?:^|/)runbook-"
        - "(?:^|/)procedure"
        - "(?:^|/)sop-"
        - "(?:^|/)guide-"
        - "(?:^|/)playbook-"
        # Uncomment for technical documentation corpora:
        # - "(?:^|/)tutorial-"
        # - "/docs?/"
        # - "/reference/"

    temporal:
      # Date-path boost: boosts docs whose FILE PATH contains a date (e.g. 2026-03-22.md).
      # Enable ONLY for corpora where YYYY-MM-DD.md daily log files are the primary query target.
      date_path_boost:
        enabled: false
        factor: 1.35
        recency_window_days: 90

      # Chunk-date boost: boosts docs by chunk_date metadata proximity to the query date.
      # Enable when chunk_date is populated at index time (see kairix index build --date-metadata).
      chunk_date_boost:
        enabled: false        # Enable for indexed corpora with chunk_date populated
        decay_halflife_days: 30

  # Cross-encoder re-ranking (requires `pip install "kairix[rerank]"`).
  # When enabled, MULTI_HOP and SEMANTIC intent queries get a second-pass
  # re-rank using a cross-encoder model for improved result ordering.
  # rerank_intents:
  #   - MULTI_HOP
  #   - SEMANTIC
